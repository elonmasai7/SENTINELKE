services:
  web:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    command: gunicorn sentinelke.asgi:application -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --workers 3
    env_file:
      - ../backend/.env.example
    depends_on:
      - db
      - neo4j
      - redis
      - ml-service
      - llama-cpp-server
    volumes:
      - ../backend:/app
    ports:
      - "8000:8000"

  celery-worker:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    command: celery -A sentinelke worker -l info
    env_file:
      - ../backend/.env.example
    depends_on:
      - web
      - redis
    volumes:
      - ../backend:/app

  ml-service:
    build:
      context: ..
      dockerfile: ml_services/Dockerfile
    ports:
      - "9000:9000"

  llama-cpp-server:
    image: ghcr.io/ggerganov/llama.cpp:server
    command: ["--port", "8080"]
    ports:
      - "8080:8080"
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: sentinelke
      POSTGRES_USER: sentinelke
      POSTGRES_PASSWORD: sentinelke
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  neo4j:
    image: neo4j:5.24
    environment:
      NEO4J_AUTH: neo4j/change-this
    volumes:
      - neo4jdata:/data
    ports:
      - "7474:7474"
      - "7687:7687"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"

volumes:
  pgdata:
  neo4jdata:


